name: Run Selenium Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps: # تم تظبيط المحاذاة والمسافات هنا لتكون تابعة للـ job
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Selenium Tests
      # تم إضافة Flag لتجاهل توقف الـ Build عند سقوط التيستات لضمان توليد الـ Reports
      run: mvn test -Dheadless=true -Dmaven.test.failure.ignore=true