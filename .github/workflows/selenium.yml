name: Run Selenium Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

# إعطاء صلاحيات للسيرفر عشان يقدر يكتب ويرفع الـ Report على GitHub Pages
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Selenium Tests
      run: mvn test -Dheadless=true -Dmaven.test.failure.ignore=true

    # 🚀 خطوة 1: جلب تاريخ التقارير القديمة (تم تصليح السطر هنا)
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      with:
        ref: gh-pages
        path: gh-pages

    # 🚀 خطوة 2: تجميع الـ Results مع الـ History لتوليد التقرير
    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: target/allure-results
        allure_history: allure-history
        keep_reports: 20

    # 🚀 خطوة 3: نشر التقرير على برانش gh-pages
    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        force_orphan: true # 👈 تم إضافة السطر ده هنا لإنشاء البرانش تلقائياً لو مش موجود